<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <div id="parent">
        <div id="header">
            <h1> This is Header</h1>
        </div>

        <div id ="div1">
            <table>
                <tr>
                    <td> <label class="textClass"> Username </label> </td>

                </tr>

        <div id="footer">
                <h1> This is footer </h1>
        </div>


    </div>
